<!DOCTYPE html>
<html>
<head>
    <title>LEGENDS OF TFI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(255, 230, 240, 0.6), rgba(240, 240, 255, 0.6)),
                url('alltfi.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        nav {
            text-align: center;
            padding: 18px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
        }

        nav a {
            text-decoration: none;
            color: #6a3d6d;
            margin: 0 18px;
            font-weight: 500;
            font-size: 16px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff5fa2;
        }

        .container {
            width: 85%;
            margin: 100px auto 120px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .container h1 {
            font-size: 40px;
            color: #6a3d6d;
            margin-bottom: 30px;
        }

        .artists {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .artist-box {
            background: rgba(255,255,255,0.7);
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .artist-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .artist-box img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .artist-box h3 {
            color: #6a3d6d;
            margin: 10px 0 5px;
        }

        .artist-box p {
            font-size: 14px;
        }

        .artist-box a {
            text-decoration: none;
            color: inherit;
        }

        footer {
            text-align: center;
            padding: 18px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            position: fixed;
            bottom: 0;
            width: 100%;
            color: #6a3d6d;
            font-size: 14px;
        }
    </style>
