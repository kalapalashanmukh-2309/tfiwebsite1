<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(255, 230, 240, 0.6), rgba(240, 240, 255, 0.6)),
                url('movies.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        nav {
            text-align: center;
            padding: 18px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
        }

        nav a {
            text-decoration: none;
            color: #6a3d6d;
            margin: 0 18px;
            font-weight: 500;
            font-size: 16px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff5fa2;
        }

        .container {
            width: 85%;
            margin: 100px auto 120px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .container h1 {
            font-size: 40px;
            color: #6a3d6d;
            margin-bottom: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .art-box {
            text-align: center;
        }

        .art-box a {
            text-decoration: none;
        }

        .gallery img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 14px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .art-box p {
            margin-top: 8px;
            font-size: 15px;
            color: #6a3d6d;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 18px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            position: fixed;
            bottom: 0;
            width: 100%;
            color: #6a3d6d;
            font-size: 14px;
        }
    </style>

</head>
